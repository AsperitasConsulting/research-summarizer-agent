[pytest]
markers =
    level3: LLM-as-judge eval tests; cost real Anthropic credits and run a slower judge model. Deselected by default; run with `pytest -m level3`.
    level4: Human-evaluation artifact generator; runs live Tavily + real agent and writes a review artifact under sample_outputs/level4/. Deselected by default; run with `pytest -m level4`.
addopts = -m "not level3 and not level4"
